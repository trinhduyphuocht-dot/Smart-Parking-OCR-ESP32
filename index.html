<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý bãi xe thông minh</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: "Segoe UI", Arial, sans-serif; }
        body { background: linear-gradient(135deg, #08142b, #1e3a8a); min-height: 100vh; color: white; padding: 30px 20px; }
        .container { max-width: 1200px; margin: auto; }
        .title { font-size: 40px; font-weight: 800; margin-bottom: 5px; }
        .subtitle { font-size: 18px; color: #dbeafe; margin-bottom: 25px; }
        .status { font-size: 14px; color: #bfdbfe; margin-bottom: 20px; }
        
        .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 20px; margin-bottom: 25px; }
        .card { border-radius: 20px; padding: 26px; box-shadow: 0 12px 30px rgba(0,0,0,0.25); border: 1px solid rgba(255,255,255,0.12); }
        .total-card { background: linear-gradient(135deg, #1d4ed8, #3b82f6); }
        .status-card { background: linear-gradient(135deg, #0f766e, #14b8a6); }
        .big { font-size: 46px; font-weight: 800; }

        .actions { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 25px; justify-content: flex-start; }
        button, .btn-export { border: none; border-radius: 10px; padding: 12px 20px; cursor: pointer; font-size: 14px; font-weight: 700; color: white; text-decoration: none; transition: 0.2s; }
        button:active { transform: scale(0.95); }
        .btn-refresh { background: #22c55e; }
        .btn-open-in { background: #0ea5e9; }
        .btn-close-in { background: #2563eb; }
        .btn-open-out { background: #14b8a6; }
        .btn-close-out { background: #8b5cf6; }
        .btn-reset { background: #ef4444; }
        .btn-export { background: #f59e0b; }

        .search-wrap { position: relative; width: 340px; margin-bottom: 15px; }
        .search-icon { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #64748b; }
        .search-box input { width: 100%; padding: 12px 40px; border-radius: 12px; border: none; outline: none; font-size: 15px; color: #333; }
        .clear-btn { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); cursor: pointer; border: none; background: #cbd5e1; width: 22px; height: 22px; border-radius: 50%; display: none; color: #0f172a; font-weight: bold; }

        .table-box { background: white; color: #0f172a; border-radius: 20px; overflow: hidden; margin-top: 10px; margin-bottom: 30px; }
        table { width: 100%; border-collapse: collapse; }
        thead { background: linear-gradient(90deg, #2563eb, #3b82f6); color: white; }
        th, td { padding: 16px; text-align: center; }
        tbody tr:nth-child(even) { background: #f8fafc; }
        .plate { font-weight: 800; color: #1d4ed8; font-size: 17px; }
        .badge { padding: 6px 12px; border-radius: 999px; font-size: 13px; font-weight: 700; }
        .tag-in { background: #dbeafe; color: #1d4ed8; }
        .tag-out { background: #dcfce7; color: #15803d; }
        .tag-deny { background: #fee2e2; color: #dc2626; }
    </style>
</head>
<body>
    <div class="container">
        <div class="title">Hệ thống quản lý bãi xe thông minh</div>
        <div class="subtitle">Theo dõi xe vào và ra trong bãi theo thời gian thực</div>
        <div id="statusText" class="status">Đang kết nối...</div>

        <div class="cards">
            <div class="card total-card">
                <h3>Tổng số xe trong bãi</h3>
                <div class="big" id="totalCars">0</div>
            </div>
            <div class="card status-card">
                <h3>Trạng thái hệ thống</h3>
                <div class="big">ONLINE</div>
            </div>
        </div>

        <div class="actions">
            <button class="btn-refresh" onclick="refreshAll()"><i class="fas fa-sync"></i> Làm mới</button>
            <button class="btn-open-in" onclick="manualAction('/manual_open_in')">Mở cổng vào</button>
            <button class="btn-close-in" onclick="manualAction('/manual_close_in')">Đóng cổng vào</button>
            <button class="btn-open-out" onclick="manualAction('/manual_open_out')">Mở cổng ra</button>
            <button class="btn-close-out" onclick="manualAction('/manual_close_out')">Đóng cổng ra</button>
            <a class="btn-export" href="/export_excel"><i class="fas fa-file-excel"></i> Xuất Excel</a>
            <button class="btn-reset" onclick="resetData()">Reset toàn bộ</button>
        </div>

        <h3>Xe đang trong bãi</h3>
        <div class="search-wrap search-box">
            <i class="fas fa-search search-icon"></i>
            <input type="text" id="currentSearch" placeholder="Tìm biển số xe..." oninput="filterCurrent()">
            <button class="clear-btn" id="clearBtnC" onclick="clearSearch('currentSearch', 'clearBtnC', filterCurrent)">×</button>
        </div>
        <div class="table-box">
            <table>
                <thead><tr><th>STT</th><th>Biển số xe</th><th>Thời gian vào</th></tr></thead>
                <tbody id="currentBody"></tbody>
            </table>
        </div>

        <h3>Lịch sử vào / ra</h3>
        <div class="search-wrap search-box">
            <i class="fas fa-search search-icon"></i>
            <input type="text" id="histSearch" placeholder="Tìm biển số trong lịch sử..." oninput="loadHistory()">
            <button class="clear-btn" id="clearBtnH" onclick="clearSearch('histSearch', 'clearBtnH', loadHistory)">×</button>
        </div>
        <div class="table-box">
            <table>
                <thead><tr><th>STT</th><th>Biển số xe</th><th>Thời gian vào</th><th>Thời gian ra</th><th>Trạng thái</th></tr></thead>
                <tbody id="historyBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        let allCurrent = [];

        async function loadCars() {
            const res = await fetch('/list');
            const data = await res.json();
            allCurrent = data.cars || [];
            document.getElementById('totalCars').innerText = data.total;
            filterCurrent();
        }

        function filterCurrent() {
            const kw = document.getElementById('currentSearch').value.toLowerCase();
            document.getElementById('clearBtnC').style.display = kw ? 'block' : 'none';
            const tbody = document.getElementById('currentBody');
            
            // Cập nhật để nhận diện mọi kiểu biến chứa biển số
            const filtered = allCurrent.filter(c => (c.plate || c.license_plate || "").toLowerCase().includes(kw));
            
            tbody.innerHTML = filtered.length ? filtered.map((c, i) => `
                <tr><td>${i+1}</td><td class="plate">${c.plate || c.license_plate || "N/A"}</td><td>${c.time_in}</td></tr>
            `).join('') : '<tr><td colspan="3" style="padding:20px; color:#999;">Không có xe</td></tr>';
        }

        async function loadHistory() {
            const kw = document.getElementById('histSearch').value;
            document.getElementById('clearBtnH').style.display = kw ? 'block' : 'none';
            const res = await fetch('/history?plate=' + encodeURIComponent(kw));
            const data = await res.json();
            
            document.getElementById('historyBody').innerHTML = (data.history || []).map((h, i) => {
                let cls = h.status === 'Đã ra' ? 'tag-out' : (h.status === 'Từ chối' ? 'tag-deny' : 'tag-in');
                return `
                <tr><td>${i+1}</td><td class="plate">${h.plate || h.license_plate || "N/A"}</td><td>${h.time_in}</td><td>${h.time_out}</td>
                <td><span class="badge ${cls}">${h.status}</span></td></tr>
                `;
            }).join('');
        }

        async function manualAction(url) {
            try {
                const res = await fetch(url);
                const data = await res.json();
                alert(data.message);
            } catch (e) {
                alert("Lỗi gửi lệnh!");
            }
        }

        function clearSearch(inputId, btnId, callback) {
            document.getElementById(inputId).value = '';
            document.getElementById(btnId).style.display = 'none';
            callback();
        }

        async function resetData() {
            if(confirm("Xóa sạch toàn bộ dữ liệu trên Flask và Firebase?")) {
                await fetch('/reset');
                refreshAll();
            }
        }

        async function refreshAll() {
            try {
                await loadCars(); await loadHistory();
                document.getElementById('statusText').innerText = 'Cập nhật lúc: ' + new Date().toLocaleTimeString('vi-VN');
            } catch(e) { 
                document.getElementById('statusText').innerText = 'Lỗi kết nối Server'; 
            }
        }

        setInterval(refreshAll, 3000);
        refreshAll();
    </script>
</body>
</html>
